<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    #debug-overlay { 
      position: fixed; top: 10px; left: 10px; z-index: 100; 
      background: rgba(0,0,0,0.8); color: #00FF00; padding: 15px; 
      font-family: monospace; font-size: 12px; pointer-events: none;
      border: 1px solid #00FF00;
    }
  </style>
</head>
<body>

  <div id="debug-overlay">
    <div id="status">System initialisiert...</div>
    <div id="tracker-log">Warte auf Marker...</div>
  </div>

  <a-scene 
    id="scene"
    mindar-image="imageTargetSrc: ./assets/marker/targets.mind; maxTrack: 3;" 
    renderer="colorManagement: true" 
    vr-mode-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="sun" src="./assets/glb/sun.glb"></a-asset-item>
      <a-asset-item id="earth" src="./assets/glb/earth.glb"></a-asset-item>
      <a-asset-item id="moon" src="./assets/glb/moon.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="sun-entity" mindar-image-target="targetIndex: 0"></a-entity>
    <a-entity id="earth-entity" mindar-image-target="targetIndex: 1"></a-entity>
    <a-entity id="moon-entity" mindar-image-target="targetIndex: 2"></a-entity>
    
  </a-scene>

  <script>
    const scene = document.querySelector('#scene');
    const statusDiv = document.getElementById('status');
    const logDiv = document.getElementById('tracker-log');

    // 1. Überwachung von Ladefehlern (Assets)
    document.querySelectorAll('a-asset-item').forEach(el => {
      el.addEventListener('error', (e) => {
        statusDiv.innerHTML = "<span style='color:red;'>LADEFEHLER: " + el.id + "</span>";
        console.error("Asset Load Error:", el.src);
      });
    });

    // 2. Tracking-Logik
    const targets = ["Sonne", "Erde", "Mond"];
    const entities = ['#sun-entity', '#earth-entity', '#moon-entity'];

    entities.forEach((id, index) => {
      const entity = document.querySelector(id);
      
      entity.addEventListener("targetFound", () => {
        logDiv.innerHTML += "<div>✅ Gefunden: " + targets[index] + "</div>";
        console.log(targets[index] + " wurde erkannt.");
      });

      entity.addEventListener("targetLost", () => {
        logDiv.innerHTML = logDiv.innerHTML.replace("<div>✅ Gefunden: " + targets[index] + "</div>", "");
        console.log(targets[index] + " verloren.");
      });
    });

    statusDiv.innerText = "System bereit. Scanne Marker...";
  </script>
</body>
</html>
