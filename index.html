<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene mindar-image="imageTargetSrc: ./assets/marker/targets.mind; uiScanning: #scanning;" color-space="sRGB" renderer="colorManagement: true" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <!-- Deine Assets laden -->
    <a-assets>
      <a-asset-item id="sun" src="./assets/glb/Sun.glb"></a-asset-item>
      <a-asset-item id="earth" src="./assets/glb/Earth.glb"></a-asset-item>
      <a-asset-item id="moon" src="./assets/glb/Moon.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Marker 0 (Sonne) -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model src="#sun" scale="0.5 0.5 0.5"></a-gltf-model>
    </a-entity>

    <!-- Marker 1 (Erde) -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-gltf-model src="#earth" scale="0.5 0.5 0.5"></a-gltf-model>
    </a-entity>

    <!-- Marker 2 (Mond) -->
    <a-entity mindar-image-target="targetIndex: 2">
      <a-gltf-model src="#moon" scale="0.5 0.5 0.5"></a-gltf-model>
    </a-entity>
    
  </a-scene>
</body>
</html>
