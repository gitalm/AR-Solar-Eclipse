<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; }
    #debug { position: absolute; top: 10px; left: 10px; color: yellow; background: rgba(0,0,0,0.5); font-family: monospace; }
  </style>
</head>
<body>

  <div id="debug">System bereit...</div>

  <a-scene 
    mindar-image="imageTargetSrc: ./assets/marker/targets.mind; maxTrack: 3;" 
    color-space="sRGB" renderer="colorManagement: true" 
    vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <a-asset-item id="sun" src="./assets/glb/sun.glb"></a-asset-item>
      <a-asset-item id="earth" src="./assets/glb/earth.glb"></a-asset-item>
      <a-asset-item id="moon" src="./assets/glb/moon.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-light type="ambient" intensity="1.5"></a-light>
    <a-light type="directional" position="0 1 0" intensity="2.0"></a-light>

    <!-- ANGEPASSTE REIHENFOLGE: -->
    
    <!-- Marker 0 war vorher Sonne, jetzt Mond -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model src="#moon" scale="0.5 0.5 0.5" position="0 0 0"></a-gltf-model>
    </a-entity>

    <!-- Marker 1 war vorher Erde, jetzt Sonne -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-gltf-model src="#sun" scale="0.125 0.125 0.125" position="0 0 0"></a-gltf-model>
    </a-entity>

    <!-- Marker 2 war vorher Mond, jetzt Erde -->
    <a-entity mindar-image-target="targetIndex: 2">
      <a-gltf-model src="#earth" scale="0.5 0.5 0.5" position="0 0 0" 
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear">
      </a-gltf-model>
    </a-entity>
    
  </a-scene>

  <script>
    const scene = document.querySelector('a-scene');
    const debug = document.getElementById('debug');
    // Map für die Anzeige
    const targetNames = ["Mond", "Sonne", "Erde"];

    scene.addEventListener("targetFound", (e) => {
      debug.innerText = "Gefunden: " + targetNames[e.detail.index];
    });

    scene.addEventListener("targetLost", () => {
      debug.innerText = "Suche...";
    });
  </script>
</body>
</html>
